name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      COMPOSE_DOCKER_CLI_BUILD: "1"
      DOCKER_BUILDKIT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Run integration tests with Docker Compose
        run: |
          # Build and run the test composition defined under result/
          docker compose -f result/docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from sut

      - name: Teardown
        if: always()
        run: |
          docker compose -f result/docker-compose.test.yml down -v
